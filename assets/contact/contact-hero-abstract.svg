<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Abstract contact hero artwork</title>
  <desc id="desc">An abstract layered composition using magenta, yellow, navy, blue, and teal with sweeping curves, circles, and fine structural lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#273540"/>
      <stop offset="52%" stop-color="#22303B"/>
      <stop offset="100%" stop-color="#1b252d"/>
    </linearGradient>
    <linearGradient id="magentaGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CB1F59" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#CB1F59" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tealGlow" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#36BFBF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#36BFBF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbonA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CB1F59" stop-opacity="0.36"/>
      <stop offset="52%" stop-color="#317987" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#36BFBF" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8E98C" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#36BFBF" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1600" height="820" fill="url(#bg)"/>

  <g opacity="0.95">
    <circle cx="180" cy="140" r="190" fill="url(#magentaGlow)" filter="url(#softBlur)"/>
    <circle cx="1430" cy="118" r="220" fill="url(#tealGlow)" filter="url(#softBlur)"/>
    <circle cx="1260" cy="660" r="180" fill="#317987" opacity="0.12" filter="url(#softBlur)"/>
  </g>

