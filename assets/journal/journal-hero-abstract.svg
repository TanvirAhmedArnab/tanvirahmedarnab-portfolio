<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Abstract journal hero artwork</title>
  <desc id="desc">An abstract reflective composition with indigo ribbons, pale editorial lines, circular note forms, and muted rose highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A3750"/>
      <stop offset="48%" stop-color="#22324A"/>
      <stop offset="100%" stop-color="#182234"/>
    </linearGradient>
    <linearGradient id="coolRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7382A7" stop-opacity="0.28"/>
      <stop offset="56%" stop-color="#9DB6C8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22324A" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="warmRibbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C56E86" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F2E6CF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blurLarge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1600" height="820" fill="url(#bg)"/>

