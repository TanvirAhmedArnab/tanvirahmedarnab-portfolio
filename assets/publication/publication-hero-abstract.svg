<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Abstract publication hero artwork</title>
  <desc id="desc">An abstract editorial composition with layered page-like ribbons, arcs, circles, and guide lines using magenta, navy, cyan, yellow, and orange.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#233d56"/>
      <stop offset="48%" stop-color="#1C3D59"/>
      <stop offset="100%" stop-color="#152d42"/>
    </linearGradient>
    <linearGradient id="warmRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D92378" stop-opacity="0.34"/>
      <stop offset="52%" stop-color="#F2BD1D" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#F2541B" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="coolRibbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04B2D9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1C3D59" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pageGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2BD1D" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F2541B" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurLarge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1600" height="820" fill="url(#bg)"/>

  <g opacity="0.9">
    <circle cx="180" cy="170" r="220" fill="#D92378" opacity="0.18" filter="url(#blurLarge)"/>
    <circle cx="1360" cy="128" r="240" fill="#04B2D9" opacity="0.16" filter="url(#blurLarge)"/>
    <circle cx="1120" cy="688" r="180" fill="#F2541B" opacity="0.1" filter="url(#blurLarge)"/>
  </g>

  <g opacity="0.92">
    <path d="M -80 314 C 120 252 350 260 580 332 C 764 390 946 394 1142 338 C 1308 292 1454 246 1680 278 L 1680 392 C 1462 364 1334 404 1160 456 C 938 522 734 510 524 440 C 322 374 140 354 -80 404 Z" fill="url(#warmRibbon)"/>
    <path d="M -120 592 C 152 430 430 420 684 492 C 918 558 1152 622 1700 468 L 1700 664 C 1160 770 910 744 644 660 C 404 584 174 548 -120 702 Z" fill="url(#coolRibbon)"/>
    <path d="M 324 212 C 458 152 650 156 824 230 C 1014 312 1188 306 1368 194" fill="none" stroke="#F2BD1D" stroke-opacity="0.54" stroke-width="3" stroke-linecap="round"/>
  </g>

